# Nombre de tu microservicio
spring.application.name=ms-jardin-catalogo

# 1. Dirección del Datasource (Conexión a MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_jardin_catalogo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración del ORM (Hibernate / JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=9080

logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.root=INFO